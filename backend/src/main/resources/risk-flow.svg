<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1e293b; }
    .title { font-size: 14px; font-weight: 700; }
    .sub { font-size: 11px; }
    .label { font-size: 12px; fill: #475569; font-weight: 600; }
    .box { stroke-width: 2; }
    .neutral { fill: #f1f5f9; stroke: #334155; }
    .decision { fill: #fef9c3; stroke: #ca8a04; }
    .low { fill: #dcfce7; stroke: #16a34a; }
    .low-text { fill: #166534; }
    .medium { fill: #fef3c7; stroke: #d97706; }
    .medium-text { fill: #92400e; }
    .high { fill: #fee2e2; stroke: #dc2626; }
    .high-text { fill: #991b1b; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; }
  </style>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Start -->
  <rect class="box neutral" x="340" y="20" width="220" height="50" rx="10"/>
  <text class="title" x="450" y="50" text-anchor="middle">sudo komutu çalıştırılır</text>

  <!-- Decision: risk seviyesi -->
  <polygon class="box decision" points="450,100 600,170 450,240 300,170"/>
  <text class="title" x="450" y="166" text-anchor="middle">Risk seviyesi?</text>
  <text class="sub" x="450" y="182" text-anchor="middle">(policy eşleşmesi)</text>

  <path class="arrow" d="M450,70 L450,100" marker-end="url(#arr)"/>

  <!-- LOW box -->
  <rect class="box low" x="60" y="300" width="220" height="60" rx="10"/>
  <text class="title low-text" x="170" y="328" text-anchor="middle">LOW</text>
  <text class="sub low-text" x="170" y="346" text-anchor="middle">otomatik onay, bekleme yok</text>
  <path class="arrow" d="M300,170 L170,170 L170,300" marker-end="url(#arr)"/>
  <text class="label" x="220" y="160" text-anchor="middle">eşleşme yok / LOW</text>

  <!-- MEDIUM box -->
  <rect class="box medium" x="340" y="300" width="220" height="60" rx="10"/>
  <text class="title medium-text" x="450" y="328" text-anchor="middle">MEDIUM</text>
  <text class="sub medium-text" x="450" y="346" text-anchor="middle">onay bekle (60sn)</text>
  <path class="arrow" d="M450,240 L450,300" marker-end="url(#arr)"/>

  <!-- HIGH box -->
  <rect class="box high" x="620" y="300" width="220" height="60" rx="10"/>
  <text class="title high-text" x="730" y="328" text-anchor="middle">HIGH</text>
  <text class="sub high-text" x="730" y="346" text-anchor="middle">onay bekle (60sn)</text>
  <path class="arrow" d="M600,170 L730,170 L730,300" marker-end="url(#arr)"/>
  <text class="label" x="670" y="160" text-anchor="middle">HIGH</text>

  <!-- Decision: onaylandı mı (MEDIUM/HIGH icin) -->
  <polygon class="box decision" points="585,440 720,500 585,560 450,500"/>
  <text class="title" x="585" y="496" text-anchor="middle">Onaylandı mı?</text>
  <path class="arrow" d="M450,360 L450,500 L450,500" marker-end="url(#arr)"/>
  <path class="arrow" d="M730,360 L730,440 L620,460" marker-end="url(#arr)"/>

  <!-- Reddedildi / timeout -->
  <rect class="box high" x="700" y="470" width="180" height="60" rx="10"/>
  <text class="title high-text" x="790" y="496" text-anchor="middle">Reddedildi /</text>
  <text class="title high-text" x="790" y="512" text-anchor="middle">Zaman Aşımı</text>
  <path class="arrow" d="M720,500 L700,500" marker-end="url(#arr)"/>
  <text class="label" x="700" y="455" text-anchor="middle" font-size="10">Hayır</text>

  <!-- Onaylandı -->
  <rect class="box low" x="380" y="470" width="180" height="60" rx="10"/>
  <text class="title low-text" x="470" y="496" text-anchor="middle">Onaylandı</text>
  <path class="arrow" d="M450,500 L560,500" marker-end="url(#arr)"/>
  <text class="label" x="500" y="455" text-anchor="middle" font-size="10">Evet</text>

  <!-- Convergence -->
  <rect class="box neutral" x="330" y="580" width="240" height="60" rx="10"/>
  <text class="title" x="450" y="606" text-anchor="middle">Audit log'a yazılır</text>
  <text class="sub" x="450" y="624" text-anchor="middle">→ exec() ile komut çalıştırılır</text>

  <path class="arrow" d="M170,360 L170,610 L330,610" marker-end="url(#arr)"/>
  <path class="arrow" d="M470,530 L470,580" marker-end="url(#arr)"/>

</svg>
